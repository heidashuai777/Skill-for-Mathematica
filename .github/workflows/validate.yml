name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate resource scaffold
        run: python -B tests/validate_resource_scaffold.py

      - name: Validate repo completeness
        run: python -B tests/validate_repo_completeness.py

      - name: Run unit tests
        run: python -B -m unittest discover -s tests

      - name: Validate manifest JSON
        run: python -B -c "import json; json.load(open('data/wolfram-resource-manifest.json', encoding='utf-8')); print('json ok')"

      - name: Check skill file synchronization
        run: diff -q .codex/skills/mathematica-codex-helper/SKILL.md .codex/skills/mathematica-codex-helper/skill.md
